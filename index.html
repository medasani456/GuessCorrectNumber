<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED & YELLOW ARCADE</title>
    <style>
        :root {
            --red: #d63031;
            --dark-red: #ae2012;
            --yellow: #feca57;
            --light-yellow: #fffae6;
            --dark: #2d3436;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }

        body {
            background-color: var(--yellow);
            background-image: radial-gradient(var(--light-yellow) 20%, transparent 20%),
                              radial-gradient(var(--light-yellow) 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: var(--dark);
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            background: var(--red);
            color: var(--yellow);
            padding: 20px;
            border: 6px solid var(--dark);
            box-shadow: 10px 10px 0px var(--dark);
            margin-bottom: 40px;
        }

        .arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-card {
            background: var(--white);
            border: 4px solid var(--dark);
            box-shadow: 8px 8px 0px var(--dark);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: transform 0.2s;
        }

        .game-card:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0px var(--dark); }

        .game-title {
            background: var(--red);
            color: var(--white);
            padding: 5px 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
            border: 2px solid var(--dark);
        }

        /* Common Elements */
        input, select {
            padding: 10px;
            border: 3px solid var(--dark);
            font-size: 1rem;
            width: 100%;
        }

        button {
            padding: 12px;
            background: var(--red);
            color: var(--white);
            border: 3px solid var(--dark);
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        button:hover { background: var(--dark-red); }
        
        .reset-btn { background: var(--dark); color: var(--yellow); margin-top: 5px; }

        .display-area {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 2px dashed var(--red);
            font-size: 0.9rem;
            padding: 10px;
            background: var(--light-yellow);
        }

        /* Reaction Game Special */
        #reactionBox { height: 100px; background: var(--dark); cursor: pointer; color: white; transition: 0s; }

    </style>
</head>
<body>

<div class="header">
    <h1>🔥 RED & YELLOW MEGA ARCADE 🔥</h1>
    <p>5 GAMES • NO TRACKING • PURE FUN</p>
</div>

<div class="arcade-grid">
    
    <div class="game-card">
        <div class="game-title">1. Guess the Number</div>
        <div class="display-area" id="guessMsg">Guess 1-100</div>
        <input type="number" id="guessInput" placeholder="Enter #">
        <button onclick="playGuess()">GUESS</button>
        <button class="reset-btn" onclick="resetGuess()">RESET GAME</button>
    </div>

    <div class="game-card">
        <div class="game-title">2. 10s Clicker</div>
        <div class="display-area" id="clickMsg">Score: 0</div>
        <button style="height: 60px; font-size: 1.5rem;" onclick="countClick()">CLICK ME!</button>
        <button class="reset-btn" onclick="resetClicker()">START/RESET</button>
    </div>

    <div class="game-card">
        <div class="game-title">3. Reaction Test</div>
        <div id="reactionBox" onclick="clickedReaction()">CLICK TO START</div>
        <div class="display-area" id="reactMsg">Wait for GREEN</div>
    </div>

    <div class="game-card">
        <div class="game-title">4. High Roller</div>
        <div class="display-area" id="diceMsg">Roll higher than the House!</div>
        <button onclick="rollDice()">ROLL DICE 🎲</button>
        <div id="diceResult" style="text-align: center; font-size: 1.2rem;"></div>
    </div>

    <div class="game-card">
        <div class="game-title">5. Word Scramble</div>
        <div class="display-area" id="scrambleWord">Push Reset to Start</div>
        <input type="text" id="wordInput" placeholder="Your Answer">
        <button onclick="checkWord()">CHECK</button>
        <button class="reset-btn" onclick="resetScramble()">NEW WORD</button>
    </div>

</div>

<script>
    // --- 1. NUMBER GUESS ---
    let gSecret, gLives;
    function resetGuess() {
        gSecret = Math.floor(Math.random() * 100) + 1;
        gLives = 10;
        document.getElementById('guessMsg').innerText = "New Game! 1-100 (10 Lives)";
        document.getElementById('guessInput').value = "";
    }
    function playGuess() {
        let val = parseInt(document.getElementById('guessInput').value);
        if(!val) return;
        if(val === gSecret) { document.getElementById('guessMsg').innerText = "🎉 YOU WON!"; }
        else {
            gLives--;
            let hint = val > gSecret ? "Too High" : "Too Low";
            document.getElementById('guessMsg').innerText = `${hint}! Lives: ${gLives}`;
            if(gLives <= 0) document.getElementById('guessMsg').innerText = "GAME OVER! It was " + gSecret;
        }
    }

    // --- 2. CLICK FAST ---
    let clicks = 0, timer = null;
    function countClick() {
        if(timer === null) return;
        clicks++;
        document.getElementById('clickMsg').innerText = "Score: " + clicks;
    }
    function resetClicker() {
        clicks = 0;
        document.getElementById('clickMsg').innerText = "Get ready...";
        clearTimeout(timer);
        setTimeout(() => {
            document.getElementById('clickMsg').innerText = "GO!";
            timer = setTimeout(() => {
                alert("Time up! Score: " + clicks);
                timer = null;
            }, 10000);
        }, 1000);
    }

    // --- 3. REACTION TEST ---
    let reactStartTime, reactTimeout;
    function clickedReaction() {
        let box = document.getElementById('reactionBox');
        if(box.style.background === 'green') {
            let diff = Date.now() - reactStartTime;
            document.getElementById('reactMsg').innerText = `Time: ${diff}ms`;
            box.style.background = '#2d3436';
            box.innerText = "CLICK TO RESTART";
        } else {
            box.innerText = "WAIT...";
            box.style.background = 'red';
            reactTimeout = setTimeout(() => {
                box.style.background = 'green';
                box.innerText = "CLICK NOW!";
                reactStartTime = Date.now();
            }, Math.random() * 3000 + 2000);
        }
    }

    // --- 4. DICE ROLLER ---
    function rollDice() {
        let player = Math.floor(Math.random() * 6) + 1;
        let house = Math.floor(Math.random() * 6) + 1;
        let result = player > house ? "WIN!" : (player === house ? "TIE" : "LOSE");
        document.getElementById('diceMsg').innerText = `You: ${player} vs House: ${house}`;
        document.getElementById('diceResult').innerText = result;
    }

    // --- 5. WORD SCRAMBLE ---
    const words = ["ARCADE", "WINNER", "YELLOW", "GAMING", "PIXELS"];
    let currentWord = "";
    function resetScramble() {
        currentWord = words[Math.floor(Math.random() * words.length)];
        let scrambled = currentWord.split('').sort(() => 0.5 - Math.random()).join('');
        document.getElementById('scrambleWord').innerText = scrambled;
        document.getElementById('wordInput').value = "";
    }
    function checkWord() {
        let val = document.getElementById('wordInput').value.toUpperCase();
        if(val === currentWord) document.getElementById('scrambleWord').innerText = "✅ CORRECT!";
        else document.getElementById('scrambleWord').innerText = "❌ TRY AGAIN";
    }

    // Init All
    resetGuess();
    resetScramble();
</script>

</body>
</html>
