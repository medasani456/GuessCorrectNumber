<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Guessing Game</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --accent: #00cec9;
            --success: #00b894;
            --danger: #ff7675;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 2rem; margin-bottom: 8px; letter-spacing: -1px; }
        .stats-row { display: flex; justify-content: space-between; margin-bottom: 25px; font-size: 0.9rem; color: #94a3b8; }

        /* Progress Bar */
        .health-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        #healthBar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.4s ease;
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        
        select, input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
            border-radius: 12px;
            outline: none;
            width: 100%;
        }

        .input-wrapper { display: flex; gap: 8px; margin-bottom: 20px; }
        input[type="number"] { font-size: 1.2rem; text-align: center; }

        button {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        #guessBtn { background: var(--primary); color: white; flex-grow: 1; }
        #guessBtn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4); }
        
        .hint-btn { background: rgba(255,255,255,0.1); color: white; font-size: 0.8rem; }
        .hint-btn.active { background: var(--accent); color: var(--bg); }

        .message-box {
            min-height: 60px;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .error-shake { animation: shake 0.4s; background: rgba(255, 118, 117, 0.1); color: var(--danger); }
        .success-glow { background: rgba(0, 184, 148, 0.1); color: var(--success); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        #resetBtn { 
            background: var(--danger); color: white; width: 100%; 
            display: none; margin-top: 10px;
        }

        .history { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .history-item { 
            width: 40px; height: 40px; line-height: 40px; 
            background: rgba(255,255,255,0.05); border-radius: 50%; font-size: 0.8rem; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Guess It.</h1>
    <div class="stats-row">
        <span>Best Score: <b id="bestScore">--</b></span>
        <span>Attempts: <b id="attemptCount">0</b></span>
    </div>

    <div class="health-bar-container">
        <div id="healthBar"></div>
    </div>

    <div class="controls">
        <select id="diffSelect">
            <option value="50">Easy (1-50)</option>
            <option value="100" selected>Medium (1-100)</option>
            <option value="500">Hard (1-500)</option>
        </select>
        <button class="hint-btn" id="hintToggle">HINTS OFF</button>
    </div>

    <div class="input-wrapper">
        <input type="number" id="userInput" placeholder="??">
        <button id="guessBtn">GUESS</button>
    </div>

    <div id="msg" class="message-box">Pick a number to start!</div>

    <div class="history" id="historyLog"></div>
    
    <button id="resetBtn">PLAY AGAIN</button>
</div>

<script>
    let secret, lives, maxLives, attempts;
    let hints = false;
    let history = [];

    const el = {
        input: document.getElementById('userInput'),
        btn: document.getElementById('guessBtn'),
        reset: document.getElementById('resetBtn'),
        msg: document.getElementById('msg'),
        health: document.getElementById('healthBar'),
        diff: document.getElementById('diffSelect'),
        hint: document.getElementById('hintToggle'),
        attempts: document.getElementById('attemptCount'),
        best: document.getElementById('bestScore'),
        history: document.getElementById('historyLog')
    };

    function init() {
        const range = parseInt(el.diff.value);
        secret = Math.floor(Math.random() * range) + 1;
        attempts = 0;
        history = [];
        
        // Dynamic lives based on difficulty
        maxLives = range === 50 ? 6 : range === 100 ? 8 : 12;
        lives = maxLives;

        el.best.textContent = localStorage.getItem('guessBest') || '--';
        el.attempts.textContent = '0';
        el.msg.textContent = `Guess between 1 and ${range}`;
        el.msg.className = 'message-box';
        el.health.style.width = '100%';
        el.health.style.background = 'linear-gradient(90deg, var(--primary), var(--accent))';
        el.input.disabled = false;
        el.btn.disabled = false;
        el.reset.style.display = 'none';
        el.history.innerHTML = '';
        el.input.value = '';
        el.input.focus();
    }

    function handleGuess() {
        const val = parseInt(el.input.value);
        if (isNaN(val) || val < 1 || val > parseInt(el.diff.value)) return;

        attempts++;
        lives--;
        el.attempts.textContent = attempts;
        updateHealth();
        addHistory(val);

        if (val === secret) {
            win();
        } else if (lives <= 0) {
            lose();
        } else {
            feedback(val);
        }
        el.input.value = '';
        el.input.focus();
    }

    function feedback(val) {
        el.msg.classList.remove('error-shake');
        void el.msg.offsetWidth; // Trigger reflow
        el.msg.classList.add('error-shake');

        let hintMsg = val > secret ? "TOO HIGH" : "TOO LOW";
        
        if (hints) {
            const diff = Math.abs(val - secret);
            if (diff < 5) hintMsg += " (MELTING! 🔥)";
            else if (diff < 15) hintMsg += " (WARM ☀️)";
        }
        el.msg.textContent = hintMsg;
    }

    function updateHealth() {
        const perc = (lives / maxLives) * 100;
        el.health.style.width = perc + '%';
        if (perc < 30) el.health.style.background = 'var(--danger)';
    }

    function addHistory(num) {
        history.unshift(num);
        if (history.length > 5) history.pop();
        el.history.innerHTML = history.map(n => `<div class="history-item">${n}</div>`).join('');
    }

    function win() {
        el.msg.textContent = `CHAMPION! Got it in ${attempts} tries.`;
        el.msg.className = 'message-box success-glow';
        endGame();
        
        const currentBest = localStorage.getItem('guessBest');
        if (!currentBest || attempts < currentBest) {
            localStorage.setItem('guessBest', attempts);
            el.best.textContent = attempts + ' (New!)';
        }
    }

    function lose() {
        el.msg.textContent = `GAME OVER. It was ${secret}.`;
        el.msg.style.color = 'var(--danger)';
        endGame();
    }

    function endGame() {
        el.input.disabled = true;
        el.btn.disabled = true;
        el.reset.style.display = 'block';
    }

    el.btn.onclick = handleGuess;
    el.reset.onclick = init;
    el.diff.onchange = init;
    el.hint.onclick = () => {
        hints = !hints;
        el.hint.textContent = hints ? 'HINTS ON' : 'HINTS OFF';
        el.hint.classList.toggle('active');
    };
    el.input.onkeydown = (e) => e.key === 'Enter' && handleGuess();

    init();
</script>
</body>
</html>
